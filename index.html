<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>発音マスター - Pronunciation Playground</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Google Fonts (Fun Font for Kids/Friendly feeling) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Kiwi+Maru:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', 'Kiwi Maru', sans-serif;
        }
        .mic-active {
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .bounce-custom {
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(-5%); animation-timing-function: cubic-bezier(0.8,0,1,1); }
            50% { transform: none; animation-timing-function: cubic-bezier(0,0,0.2,1); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-100 via-purple-50 to-pink-100 min-h-screen flex flex-col justify-between text-gray-800 selection:bg-purple-200">

    <!-- Header -->
    <header class="w-full max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-gradient-to-tr from-pink-500 to-violet-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-purple-200 transform -rotate-6">
                <i data-lucide="speech" class="w-7 h-7"></i>
            </div>
            <div>
                <h1 class="text-2xl md:text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-violet-700 tracking-wide">発音マスター</h1>
                <p class="text-xs text-purple-600 font-bold tracking-widest uppercase">Pronunciation Playground</p>
            </div>
        </div>
        <!-- Status Indicator -->
        <div class="flex items-center gap-2 bg-white/80 backdrop-blur-md px-4 py-2 rounded-full border border-purple-100 shadow-sm">
            <span id="mic-status-dot" class="w-3 h-3 rounded-full bg-amber-400"></span>
            <span id="mic-status-text" class="text-xs font-semibold text-gray-600">マイク準備中</span>
        </div>
    </header>

    <!-- Main Container -->
    <main class="flex-grow w-full max-w-4xl mx-auto px-4 py-2 flex flex-col gap-6 justify-center">
        
        <!-- Category Selector -->
        <div class="bg-white/70 backdrop-blur-md p-2 rounded-2xl border border-white/60 shadow-md flex gap-2 overflow-x-auto scrollbar-none scroll-smooth">
            <button onclick="changeCategory('alphabet')" id="btn-alphabet" class="category-tab flex-1 min-w-[100px] text-center py-2.5 px-4 rounded-xl font-bold text-sm transition-all duration-300 flex items-center justify-center gap-2 bg-gradient-to-r from-purple-600 to-indigo-600 text-white shadow-md shadow-purple-100">
                🔠 ABC
            </button>
            <button onclick="changeCategory('hiragana')" id="btn-hiragana" class="category-tab flex-1 min-w-[100px] text-center py-2.5 px-4 rounded-xl font-bold text-sm transition-all duration-300 flex items-center justify-center gap-2 bg-white text-purple-700 hover:bg-purple-50">
                🇯🇵 あいうえお
            </button>
            <button onclick="changeCategory('words')" id="btn-words" class="category-tab flex-1 min-w-[100px] text-center py-2.5 px-4 rounded-xl font-bold text-sm transition-all duration-300 flex items-center justify-center gap-2 bg-white text-purple-700 hover:bg-purple-50">
                🍎 たんご
            </button>
            <button onclick="changeCategory('phrases')" id="btn-phrases" class="category-tab flex-1 min-w-[100px] text-center py-2.5 px-4 rounded-xl font-bold text-sm transition-all duration-300 flex items-center justify-center gap-2 bg-white text-purple-700 hover:bg-purple-50">
                💬 えいかいわ
            </button>
        </div>

        <!-- Practice Stage -->
        <div class="relative bg-white rounded-3xl border border-purple-100 shadow-xl overflow-hidden flex flex-col md:flex-row min-h-[420px]">
            
            <!-- Character & Balloon Section (Left/Top) -->
            <div class="md:w-2/5 bg-gradient-to-b md:bg-gradient-to-r from-purple-50 to-white p-6 flex flex-col items-center justify-center border-b md:border-b-0 md:border-r border-purple-100/60">
                <!-- Character Avatar -->
                <div class="relative w-36 h-36 bg-gradient-to-tr from-pink-300 to-purple-400 rounded-full flex items-center justify-center shadow-inner bounce-custom">
                    <!-- Dynamic Face Emoji inside character -->
                    <span id="char-face" class="text-7xl select-none filter drop-shadow">🤖</span>
                    <div class="absolute -bottom-2 bg-purple-600 text-white text-[11px] px-3 py-1 rounded-full font-bold uppercase tracking-wider shadow-md">
                        コーチ
                    </div>
                </div>
                <!-- Character Comment Balloon -->
                <div class="mt-6 bg-white border-2 border-purple-100 px-4 py-3 rounded-2xl relative shadow-sm max-w-xs text-center">
                    <div class="absolute -top-2 left-1/2 transform -translate-x-1/2 w-4 h-4 bg-white border-t-2 border-l-2 border-purple-100 rotate-45 md:hidden"></div>
                    <div class="absolute -right-2 top-1/2 transform -translate-y-1/2 w-4 h-4 bg-white border-t-2 border-r-2 border-purple-100 rotate-45 hidden md:block"></div>
                    <p id="char-bubble" class="text-sm font-semibold text-purple-800">ぼくのあとに続いて発音してみてね！</p>
                </div>
            </div>

            <!-- Content Area (Right/Bottom) -->
            <div class="flex-grow p-6 md:p-8 flex flex-col justify-between gap-6">
                
                <!-- Topic Display & Pronunciation Source -->
                <div class="text-center md:text-left flex flex-col justify-center flex-grow py-4">
                    <div class="flex justify-between items-center mb-2">
                        <span id="card-index" class="text-xs font-bold text-purple-400 tracking-wider">CARD 1 / 10</span>
                        <div class="flex gap-1 text-amber-400 text-lg" id="card-stars">
                            <!-- Star ratings will be injected here -->
                        </div>
                    </div>
                    
                    <!-- Main Target Text -->
                    <div class="relative inline-block mx-auto md:mx-0">
                        <h2 id="target-text" class="text-4xl md:text-6xl font-extrabold text-slate-800 tracking-tight leading-tight select-all">Apple</h2>
                    </div>
                    
                    <!-- Auxiliary Translation/Pronunciation Helper -->
                    <p id="target-translation" class="text-lg md:text-xl font-bold text-slate-400 mt-2">りんご (ri-n-go)</p>
                </div>

                <!-- Interactive Results Box (Hidden by default, shown on Speak) -->
                <div id="results-box" class="hidden bg-slate-50 border border-slate-100 p-4 rounded-2xl transition-all duration-300">
                    <div class="flex items-center justify-between gap-4 mb-2">
                        <span class="text-xs font-bold text-gray-400 uppercase">聞き取れた言葉:</span>
                        <span id="match-score-badge" class="bg-purple-100 text-purple-700 font-extrabold text-sm px-3 py-1 rounded-full">85 点</span>
                    </div>
                    <p id="recognized-text" class="text-xl font-bold text-gray-700 italic">"..."</p>
                </div>

                <!-- Action Panel -->
                <div class="flex flex-col sm:flex-row gap-4 items-center">
                    
                    <!-- Play Reference Sound (TTS) -->
                    <button onclick="speakTarget()" class="w-full sm:w-auto flex-1 bg-amber-400 hover:bg-amber-500 text-slate-900 font-extrabold py-4 px-6 rounded-2xl shadow-lg shadow-amber-100 hover:shadow-xl transition-all duration-200 transform active:scale-95 flex items-center justify-center gap-3 text-lg">
                        <i data-lucide="volume-2" class="w-6 h-6 animate-pulse"></i>
                        <span>お手本を聴く</span>
                    </button>

                    <!-- Speak Button -->
                    <button id="btn-record" onclick="toggleListening()" class="w-full sm:w-auto flex-1 bg-pink-500 hover:bg-pink-600 text-white font-extrabold py-4 px-6 rounded-2xl shadow-lg shadow-pink-200 hover:shadow-xl transition-all duration-200 transform active:scale-95 flex items-center justify-center gap-3 text-lg relative">
                        <span id="record-icon-wrapper" class="relative flex h-6 w-6 items-center justify-center">
                            <i data-lucide="mic" id="record-icon" class="w-6 h-6"></i>
                        </span>
                        <span id="record-btn-text">自分で発音する</span>
                    </button>
                    
                </div>
            </div>
        </div>

        <!-- Pagination & Utility Panel -->
        <div class="flex justify-between items-center px-2">
            <button onclick="prevCard()" class="bg-white hover:bg-purple-50 text-purple-700 border border-purple-100 font-bold py-3 px-5 rounded-2xl shadow-sm transition-all flex items-center gap-2 transform active:scale-95">
                <i data-lucide="chevron-left" class="w-5 h-5"></i>
                <span>まえへ</span>
            </button>
            <div class="flex gap-2">
                <button onclick="resetStats()" title="進捗をリセット" class="bg-white hover:bg-red-50 text-red-500 border border-red-100 p-3 rounded-2xl shadow-sm transition-all transform active:scale-95">
                    <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                </button>
            </div>
            <button onclick="nextCard()" class="bg-white hover:bg-purple-50 text-purple-700 border border-purple-100 font-bold py-3 px-5 rounded-2xl shadow-sm transition-all flex items-center gap-2 transform active:scale-95">
                <span>つぎへ</span>
                <i data-lucide="chevron-right" class="w-5 h-5"></i>
            </button>
        </div>

    </main>

    <!-- Interactive Instruction Modal (Shows on start if mic needs permission) -->
    <div id="mic-instruction-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-3xl p-6 md:p-8 max-w-sm w-full text-center shadow-2xl border border-purple-50">
            <div class="w-16 h-16 bg-red-100 text-red-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i data-lucide="mic-off" class="w-8 h-8"></i>
            </div>
            <h3 class="text-xl font-bold text-slate-800 mb-2">マイクの使用許可が必要です</h3>
            <p class="text-sm text-slate-500 mb-6 leading-relaxed">
                このアプリは発音を聴き取って判定するためにマイクを使用します。ブラウザの許可リクエストが表示されたら、「許可」を選択してください。
            </p>
            <button onclick="closeModal()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-extrabold py-3.5 px-6 rounded-2xl shadow-lg shadow-purple-100 transition-all">
                了解しました！
            </button>
        </div>
    </div>

    <!-- Footer -->
    <footer class="w-full text-center py-6 text-xs text-purple-400/80 font-semibold tracking-wider">
        © 2026 発音マスター • Web Speech API Powered
    </footer>

    <!-- App Logic -->
    <script>
        // --- 練習コンテンツデータ ---
        const courses = {
            alphabet: [
                { text: "A", lang: "en-US", translation: "エー (A)", bubble: "アルファベットの最初！元気よく言ってみよう！" },
                { text: "B", lang: "en-US", translation: "ビー (B)", bubble: "唇をしっかり閉じてから弾けさせてね！" },
                { text: "C", lang: "en-US", translation: "シー (C)", bubble: "空気を歯の間から抜くイメージだよ。" },
                { text: "D", lang: "en-US", translation: "ディー (D)", bubble: "舌を上あごにつけて、強く弾こう！" },
                { text: "E", lang: "en-US", translation: "イー (E)", bubble: "口を横に大きく引っ張って発音してね。" },
                { text: "F", lang: "en-US", translation: "エフ (F)", bubble: "上の歯で下唇を軽く噛んで、息を吐いてね！" },
                { text: "G", lang: "en-US", translation: "ジー (G)", bubble: "「ジ」の音に少し息を混ぜてみよう！" },
                { text: "H", lang: "en-US", translation: "エイチ (H)", bubble: "最後に息を少し吐き出す感じで！" },
                { text: "Z", lang: "en-US", translation: "ズィー (Z)", bubble: "ハチの羽音のように、喉を震わせてね！" }
            ],
            hiragana: [
                { text: "あ", lang: "ja-JP", translation: "A (a)", bubble: "口を丸く大きく開けて「あ」！" },
                { text: "い", lang: "ja-JP", translation: "I (i)", bubble: "口を横ににっこり引っ張って「い」！" },
                { text: "う", lang: "ja-JP", translation: "U (u)", bubble: "唇を前に突き出して「う」だよ！" },
                { text: "え", lang: "ja-JP", translation: "E (e)", bubble: "日本語の「え」は少し口を緩めて発音しよう。" },
                { text: "お", lang: "ja-JP", translation: "O (o)", bubble: "丸いコップを作るように口を開けてね。" },
                { text: "ありがとう", lang: "ja-JP", translation: "Arigatou", bubble: "感謝の気持ちを込めて言ってみよう！" },
                { text: "こんにちは", lang: "ja-JP", translation: "Konnichiwa", bubble: "ハキハキと元気に挨拶してみよう！" }
            ],
            words: [
                { text: "Apple", lang: "en-US", translation: "りんご (æpl)", bubble: "「エ」と「ア」の中間の音を意識してみてね！" },
                { text: "Banana", lang: "en-US", translation: "バナナ (bənǽnə)", bubble: "真ん中の「ナ」にアクセントを置いてみよう。" },
                { text: "Cat", lang: "en-US", translation: "ねこ (kæt)", bubble: "最後の「t」は息だけで「ツ」と囁くように！" },
                { text: "Dog", lang: "en-US", translation: "いぬ (dɔːg)", bubble: "「ド」を強めにして、最後は軽く「グ」！" },
                { text: "Elephant", lang: "en-US", translation: "ぞう (éləfənt)", bubble: "最初の「エ」を強く。phは「f」の音だよ！" },
                { text: "Orange", lang: "en-US", translation: "オレンジ (ɔ́ːrindʒ)", bubble: "「オー」じゃなくて「オゥ」に近い音だよ。" },
                { text: "Tomato", lang: "en-US", translation: "トマト (təméitou)", bubble: "英語だと「トメイトゥ」に近い発音になるよ！" }
            ],
            phrases: [
                { text: "Good morning", lang: "en-US", translation: "おはようございます", bubble: "朝の挨拶！さわやかに発音してね。" },
                { text: "How are you?", lang: "en-US", translation: "お元気ですか？", bubble: "相手を気遣う気持ちで。語尾を少し上げてね！" },
                { text: "Thank you very much", lang: "en-US", translation: "本当にありがとうございます", bubble: "「Thank」の「th」は舌を歯で挟んでね！" },
                { text: "Nice to meet you", lang: "en-US", translation: "はじめまして", bubble: "出会えて嬉しい気持ちを込めて発音しよう！" },
                { text: "See you later", lang: "en-US", translation: "またね！", bubble: "「L」と「R」の違いに気をつけよう。" },
                { text: "Have a nice day", lang: "en-US", translation: "良い一日を！", bubble: "「Have a」は「ハヴァ」と繋げて言うとカッコいいね！" }
            ]
        };

        // --- 状態管理 ---
        let currentCategory = 'alphabet';
        let currentIndex = 0;
        let isListening = false;
        let scoreStats = JSON.parse(localStorage.getItem('pronunciation_scores')) || {};

        // Speech API
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let synth = window.speechSynthesis;

        // キャラクターの表情リスト
        const faces = {
            idle: "🤖",
            listening: "👂",
            success: "🎉",
            great: "🌟",
            ok: "👍",
            retry: "😅",
            speaking: "🗣️"
        };

        // --- 初期化 ---
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            initSpeechRecognition();
            updateCard();
            
            // 初回訪問時、マイク確認ダイアログを匂わせる
            checkMicPermission();
        });

        // --- 音声認識の初期化 ---
        function initSpeechRecognition() {
            if (!SpeechRecognition) {
                updateMicStatus('bg-red-500', '音声認識未対応');
                setBubbleText("お使いのブラウザは音声認識に対応していません。Google ChromeやSafariをご使用ください。");
                return;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isListening = true;
                updateRecordButtonState(true);
                updateMicStatus('bg-red-500 mic-active', '聞いてるよ...');
                setFace('listening');
                setBubbleText("準備はいい？はっきりと発音してみてね！");
                document.getElementById('results-box').classList.add('hidden');
            };

            recognition.onerror = (event) => {
                console.error("Speech Recognition Error:", event.error);
                isListening = false;
                updateRecordButtonState(false);
                setFace('retry');

                if (event.error === 'not-allowed') {
                    showModal();
                    updateMicStatus('bg-red-500', 'マイク拒否');
                    setBubbleText("マイクの使用許可が必要だよ。上の方にある設定を確認してね！");
                } else if (event.error === 'no-speech') {
                    updateMicStatus('bg-amber-400', '聞き取れなかった');
                    setBubbleText("声が小さかったか、うまく届かなかったかも。もう一度試してみて！");
                } else {
                    updateMicStatus('bg-amber-400', 'エラー発生');
                    setBubbleText("ちょっと電波が悪いかも。もう一回やってみよう！");
                }
            };

            recognition.onend = () => {
                isListening = false;
                updateRecordButtonState(false);
                updateMicStatus('bg-green-500', 'マイクOK');
            };

            recognition.onresult = (event) => {
                const speechResult = event.results[0][0].transcript;
                processPronunciationResult(speechResult);
            };
        }

        // --- マイク状態の表示更新 ---
        function updateMicStatus(colorClass, text) {
            const dot = document.getElementById('mic-status-dot');
            const textEl = document.getElementById('mic-status-text');
            
            dot.className = `w-3 h-3 rounded-full ${colorClass}`;
            textEl.innerText = text;
        }

        // --- マイクパーミッションの事前確認 ---
        async function checkMicPermission() {
            try {
                const result = await navigator.permissions.query({ name: 'microphone' });
                if (result.state === 'denied') {
                    showModal();
                } else if (result.state === 'prompt') {
                    updateMicStatus('bg-amber-400', 'マイク待機中');
                } else {
                    updateMicStatus('bg-green-500', 'マイクOK');
                }
            } catch (e) {
                // Firefox や Safari で permissions.query がサポートされていない場合のフォールバック
                updateMicStatus('bg-amber-400', 'マイク準備OK');
            }
        }

        // --- カードデータの描画 ---
        function updateCard() {
            const currentItem = courses[currentCategory][currentIndex];
            
            document.getElementById('target-text').innerText = currentItem.text;
            document.getElementById('target-translation').innerText = currentItem.translation;
            document.getElementById('card-index').innerText = `CARD ${currentIndex + 1} / ${courses[currentCategory].length}`;
            
            setFace('idle');
            setBubbleText(currentItem.bubble);
            
            // 過去のスコア反映
            const scoreKey = `${currentCategory}_${currentIndex}`;
            const previousScore = scoreStats[scoreKey];
            const starsContainer = document.getElementById('card-stars');
            starsContainer.innerHTML = '';
            
            if (previousScore !== undefined) {
                const starsCount = getStarsFromScore(previousScore);
                for (let i = 0; i < 3; i++) {
                    const starIcon = document.createElement('i');
                    starIcon.setAttribute('data-lucide', 'star');
                    starIcon.className = `w-5 h-5 ${i < starsCount ? 'fill-amber-400 text-amber-400' : 'text-slate-300'}`;
                    starsContainer.appendChild(starIcon);
                }
            } else {
                for (let i = 0; i < 3; i++) {
                    const starIcon = document.createElement('i');
                    starIcon.setAttribute('data-lucide', 'star');
                    starIcon.className = 'w-5 h-5 text-slate-200';
                    starsContainer.appendChild(starIcon);
                }
            }
            
            // 結果パネルを隠す
            document.getElementById('results-box').classList.add('hidden');
            
            lucide.createIcons();
        }

        // --- 音声再生（お手本TTS） ---
        function speakTarget() {
            if (synth.speaking) {
                synth.cancel();
            }

            const currentItem = courses[currentCategory][currentIndex];
            const utterance = new SpeechSynthesisUtterance(currentItem.text);
            
            utterance.lang = currentItem.lang;
            utterance.rate = 0.9; // お子様や練習用に少しゆっくり再生

            utterance.onstart = () => {
                setFace('speaking');
                setBubbleText("よく聞いて、口の形を真似してみてね！");
            };

            utterance.onend = () => {
                setFace('idle');
            };

            synth.speak(utterance);
        }

        // --- 録音開始/停止トグル ---
        function toggleListening() {
            if (!recognition) {
                initSpeechRecognition();
                if (!recognition) return;
            }

            if (isListening) {
                recognition.stop();
            } else {
                if (synth.speaking) {
                    synth.cancel();
                }
                const currentItem = courses[currentCategory][currentIndex];
                recognition.lang = currentItem.lang;
                
                try {
                    recognition.start();
                } catch (e) {
                    console.error("録音スタート失敗:", e);
                }
            }
        }

        // 録音ボタンのUI切り替え
        function updateRecordButtonState(active) {
            const btn = document.getElementById('btn-record');
            const iconWrapper = document.getElementById('record-icon-wrapper');
            const icon = document.getElementById('record-icon');
            const text = document.getElementById('record-btn-text');

            if (active) {
                btn.className = "w-full sm:w-auto flex-1 bg-red-500 hover:bg-red-600 text-white font-extrabold py-4 px-6 rounded-2xl shadow-lg shadow-red-200 hover:shadow-xl transition-all duration-200 transform active:scale-95 flex items-center justify-center gap-3 text-lg";
                icon.setAttribute('data-lucide', 'square');
                iconWrapper.classList.add('mic-active');
                text.innerText = "ストップ";
            } else {
                btn.className = "w-full sm:w-auto flex-1 bg-pink-500 hover:bg-pink-600 text-white font-extrabold py-4 px-6 rounded-2xl shadow-lg shadow-pink-200 hover:shadow-xl transition-all duration-200 transform active:scale-95 flex items-center justify-center gap-3 text-lg";
                icon.setAttribute('data-lucide', 'mic');
                iconWrapper.classList.remove('mic-active');
                text.innerText = "自分で発音する";
            }
            lucide.createIcons();
        }

        // --- 発音の類似度判定 ---
        function processPronunciationResult(speechResult) {
            const currentItem = courses[currentCategory][currentIndex];
            const targetText = currentItem.text;

            // クレンジング処理（小文字化、記号排除）
            const cleanText = (str) => {
                return str.toLowerCase()
                          .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?？。、]/g,"")
                          .trim();
            };

            const cleanTarget = cleanText(targetText);
            const cleanSpeech = cleanText(speechResult);

            let score = 0;

            // 簡易類似度アルゴリズム（レーベンシュタイン距離）
            score = Math.round(calculateSimilarity(cleanTarget, cleanSpeech) * 100);

            // スコア評価と演出
            displayResult(speechResult, score);
        }

        // レーベンシュタイン距離を用いた類似度計算
        function calculateSimilarity(s1, s2) {
            if (s1 === s2) return 1.0;
            if (s1.length === 0 || s2.length === 0) return 0.0;

            // 部分一致やひらがな対応の補正
            if (s2.includes(s1) || s1.includes(s2)) {
                const ratio = Math.min(s1.length, s2.length) / Math.max(s1.length, s2.length);
                return 0.5 + (ratio * 0.5);
            }

            const costs = new Array();
            for (let i = 0; i <= s1.length; i++) {
                let lastValue = i;
                for (let j = 0; j <= s2.length; j++) {
                    if (i == 0) {
                        costs[j] = j;
                    } else {
                        if (j > 0) {
                            let newValue = costs[j - 1];
                            if (s1.charAt(i - 1) != s2.charAt(j - 1)) {
                                newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                            }
                            costs[j - 1] = lastValue;
                            lastValue = newValue;
                        }
                    }
                }
                if (i > 0) costs[s2.length] = lastValue;
            }
            
            const distance = costs[s2.length];
            const maxLength = Math.max(s1.length, s2.length);
            return (maxLength - distance) / maxLength;
        }

        // --- スコアに基づく星の取得 ---
        function getStarsFromScore(score) {
            if (score >= 90) return 3;
            if (score >= 60) return 2;
            if (score >= 20) return 1;
            return 0;
        }

        // --- 結果表示 ---
        function displayResult(recognized, score) {
            const resultsBox = document.getElementById('results-box');
            const recognizedTextEl = document.getElementById('recognized-text');
            const matchScoreBadge = document.getElementById('match-score-badge');

            // 履歴保存（最高スコアを記録）
            const scoreKey = `${currentCategory}_${currentIndex}`;
            if (scoreStats[scoreKey] === undefined || scoreStats[scoreKey] < score) {
                scoreStats[scoreKey] = score;
                localStorage.setItem('pronunciation_scores', JSON.stringify(scoreStats));
            }

            // カード表示の星マークを更新
            updateCardStars(score);

            // 結果ボードへの反映
            recognizedTextEl.innerText = `"${recognized}"`;
            matchScoreBadge.innerText = `${score} 点`;
            
            if (score >= 90) {
                matchScoreBadge.className = "bg-green-100 text-green-700 font-extrabold text-sm px-3 py-1 rounded-full animate-bounce";
                setFace('success');
                setBubbleText("すごすぎる！ネイティブ並みのカンペキな発音だよ！🌟");
                triggerConfetti();
            } else if (score >= 60) {
                matchScoreBadge.className = "bg-amber-100 text-amber-700 font-extrabold text-sm px-3 py-1 rounded-full";
                setFace('great');
                setBubbleText("とっても上手！その調子で繰り返し練習しよう！👍");
            } else if (score >= 30) {
                matchScoreBadge.className = "bg-purple-100 text-purple-700 font-extrabold text-sm px-3 py-1 rounded-full";
                setFace('ok');
                setBubbleText("うん、惜しい！もう少し口をはっきり動かすといいかも。");
            } else {
                matchScoreBadge.className = "bg-rose-100 text-rose-700 font-extrabold text-sm px-3 py-1 rounded-full";
                setFace('retry');
                setBubbleText("ちょっと聞き取るのが難しかったかな？お手本をもう一度聞いてみてね。");
            }

            resultsBox.classList.remove('hidden');
        }

        // 星をすぐに更新する
        function updateCardStars(score) {
            const starsContainer = document.getElementById('card-stars');
            starsContainer.innerHTML = '';
            const starsCount = getStarsFromScore(score);
            for (let i = 0; i < 3; i++) {
                const starIcon = document.createElement('i');
                starIcon.setAttribute('data-lucide', 'star');
                starIcon.className = `w-5 h-5 ${i < starsCount ? 'fill-amber-400 text-amber-400' : 'text-slate-300'}`;
                starsContainer.appendChild(starIcon);
            }
            lucide.createIcons();
        }

        // --- 紙吹雪エフェクト ---
        function triggerConfetti() {
            confetti({
                particleCount: 120,
                spread: 70,
                origin: { y: 0.6 }
            });
        }

        // --- カテゴリーの切り替え ---
        function changeCategory(category) {
            if (currentCategory === category) return;
            
            // タブのハイライトの付け替え
            const tabs = document.querySelectorAll('.category-tab');
            tabs.forEach(tab => {
                tab.className = "category-tab flex-1 min-w-[100px] text-center py-2.5 px-4 rounded-xl font-bold text-sm transition-all duration-300 flex items-center justify-center gap-2 bg-white text-purple-700 hover:bg-purple-50";
            });

            const activeBtn = document.getElementById(`btn-${category}`);
            activeBtn.className = "category-tab flex-1 min-w-[100px] text-center py-2.5 px-4 rounded-xl font-bold text-sm transition-all duration-300 flex items-center justify-center gap-2 bg-gradient-to-r from-purple-600 to-indigo-600 text-white shadow-md shadow-purple-100";

            currentCategory = category;
            currentIndex = 0;
            updateCard();
        }

        // --- ナビゲーション ---
        function nextCard() {
            const list = courses[currentCategory];
            if (currentIndex < list.length - 1) {
                currentIndex++;
            } else {
                currentIndex = 0; // ループ
            }
            updateCard();
        }

        function prevCard() {
            const list = courses[currentCategory];
            if (currentIndex > 0) {
                currentIndex--;
            } else {
                currentIndex = list.length - 1; // ループ
            }
            updateCard();
        }

        // 進捗をリセット
        function resetStats() {
            if (confirm("これまでの発音スコアと星の数をすべてクリアしますか？")) {
                scoreStats = {};
                localStorage.removeItem('pronunciation_scores');
                updateCard();
            }
        }

        // --- ヘルパー関数 ---
        function setFace(mood) {
            document.getElementById('char-face').innerText = faces[mood] || faces.idle;
        }

        function setBubbleText(text) {
            document.getElementById('char-bubble').innerText = text;
        }

        function showModal() {
            document.getElementById('mic-instruction-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('mic-instruction-modal').classList.add('hidden');
            // 一度空で開始してマイクプロンプトをブラウザ側に強制表示する
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(() => {
                    updateMicStatus('bg-green-500', 'マイクOK');
                    if (recognition) initSpeechRecognition();
                })
                .catch(err => {
                    console.warn("マイク不許可、またはデバイスなし:", err);
                    updateMicStatus('bg-red-500', '使用不可');
                });
        }
    </script>
</body>
